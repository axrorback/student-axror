<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Kirish — Student Portal{% endblock title %}</title>

    <link rel="icon" type="image/jpeg" href="https://media.axror.tech/media/axror/profile_Oorl551.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f7f9;
            --card-bg: #ffffff;
            --text: #24292f;
            --primary: #1a7f37; /* GitHub Green */
            --accent: #0969da; /* Link Blue */
            --border: #d0d7de;
            --terminal-head: #eef1f4;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            line-height: 1.5;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .auth-container {
            max-width: 950px;
            width: 100%;
            margin: auto;
            padding: 20px 15px;
        }

        /* Terminal Window */
        .terminal-window {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .terminal-header {
            background: var(--terminal-head);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .terminal-dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-1 { background: #ff5f56; }
        .dot-2 { background: #ffbd2e; }
        .dot-3 { background: #27c93f; }

        .path-display {
            font-size: 0.75rem;
            color: #656d76;
        }

        .terminal-body {
            padding: 25px;
        }
        @media (min-width: 768px) {
            .terminal-body { padding: 40px; }
        }

        /* Forms */
        .form-control-geek {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            border-radius: 6px;
            padding: 9px 12px;
        }
        .form-control-geek:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: inset 0 1px 0 rgba(1,4,9,0.04), 0 0 0 3px rgba(26,127,55,0.2);
            outline: none;
        }

        .input-group-geek-text {
            background: var(--terminal-head);
            border: 1px solid var(--border);
            color: #656d76;
            border-radius: 6px 0 0 6px;
        }

        /* Custom GitHub style primary button */
        .btn-geek-primary {
            background-color: var(--primary);
            color: #ffffff;
            border: 1px solid rgba(27,31,36,0.15);
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            padding: 10px 20px;
            transition: 0.1s ease;
        }
        .btn-geek-primary:hover {
            background-color: #1a7332;
            color: #ffffff;
        }

        .text-prompt {
            color: var(--primary);
            font-weight: 600;
        }
        .text-accent {
            color: var(--accent);
        }
        .border-dashed-geek {
            border-top: 1px dashed var(--border);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <div class="container auth-container">
        {% block main_auth %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
